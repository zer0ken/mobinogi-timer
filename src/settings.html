<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobinogi Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h2 { margin-bottom: 16px; font-size: 16px; }
    .field {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      width: 100px;
      font-size: 13px;
    }
    input[type="number"] {
      width: 80px;
      padding: 4px 8px;
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
    }
    .unit { font-size: 12px; color: #999; }
    input[type="range"] {
      width: 100px;
      accent-color: #4caf50;
    }
    .range-value {
      font-size: 12px;
      color: #999;
      min-width: 32px;
    }
    input[type="checkbox"] {
      accent-color: #4caf50;
      width: 16px;
      height: 16px;
    }
    .hotkey-btn {
      padding: 4px 16px;
      min-width: 80px;
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
      text-align: center;
    }
    .hotkey-btn:hover { border-color: #888; }
    .hotkey-btn.listening {
      border-color: #4caf50;
      color: #4caf50;
    }
    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 6px 16px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #333;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #444; }
    button.primary {
      background: #4caf50;
      border-color: #4caf50;
      color: #fff;
    }
    button.primary:hover { background: #45a049; }
    .saved {
      font-size: 12px;
      color: #4caf50;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show { opacity: 1; }
    .hint {
      margin-top: 16px;
      font-size: 11px;
      color: #777;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h2>Mobinogi Timer</h2>
  <div class="field">
    <label for="duration">지속시간</label>
    <input type="number" id="duration" min="1" max="600" value="30">
    <span class="unit">초</span>
  </div>
  <div class="field">
    <label for="cooldown">쿨다운</label>
    <input type="number" id="cooldown" min="1" max="600" value="60">
    <span class="unit">초</span>
  </div>
  <div class="field">
    <label>단축키</label>
    <button type="button" id="hotkey-btn" class="hotkey-btn">`</button>
  </div>
  <div class="field">
    <label for="opacity">투명도</label>
    <input type="range" id="opacity" min="10" max="100" value="85">
    <span class="range-value" id="opacity-value">85%</span>
  </div>
  <div class="field">
    <label for="auto-repeat">자동 반복</label>
    <input type="checkbox" id="auto-repeat" checked>
  </div>
  <div class="buttons">
    <button id="save" class="primary">저장</button>
    <span id="saved-msg" class="saved">저장됨!</span>
  </div>
  <div class="hint">
    단축키: 타이머 시작/재시작<br>
    설정창 선택 상태에서 오버레이 드래그 가능<br>
    이 창을 닫으면 앱이 종료됩니다.
  </div>
  <script>
    const { invoke } = window.__TAURI__.core;

    const durationInput = document.getElementById("duration");
    const cooldownInput = document.getElementById("cooldown");
    const hotkeyBtn = document.getElementById("hotkey-btn");
    const opacityInput = document.getElementById("opacity");
    const opacityValue = document.getElementById("opacity-value");
    const autoRepeatInput = document.getElementById("auto-repeat");
    const savedMsg = document.getElementById("saved-msg");

    opacityInput.addEventListener("input", () => {
      opacityValue.textContent = opacityInput.value + "%";
    });

    // JS event.code → Windows VK code mapping
    const CODE_TO_VK = {
      Backquote: 0xC0, Minus: 0xBD, Equal: 0xBB,
      BracketLeft: 0xDB, BracketRight: 0xDD, Backslash: 0xDC,
      Semicolon: 0xBA, Quote: 0xDE, Comma: 0xBC, Period: 0xBE, Slash: 0xBF,
      Insert: 0x2D, Delete: 0x2E, Home: 0x24, End: 0x23,
      PageUp: 0x21, PageDown: 0x22,
      NumpadMultiply: 0x6A, NumpadAdd: 0x6B,
      NumpadSubtract: 0x6D, NumpadDecimal: 0x6E, NumpadDivide: 0x6F,
      Space: 0x20, Tab: 0x09, CapsLock: 0x14,
      ScrollLock: 0x91, Pause: 0x13,
    };
    // F1-F12
    for (let i = 1; i <= 12; i++) CODE_TO_VK[`F${i}`] = 0x70 + (i - 1);
    // A-Z
    for (let i = 0; i < 26; i++) CODE_TO_VK[`Key${String.fromCharCode(65 + i)}`] = 65 + i;
    // 0-9
    for (let i = 0; i < 10; i++) CODE_TO_VK[`Digit${i}`] = 48 + i;
    // Numpad 0-9
    for (let i = 0; i < 10; i++) CODE_TO_VK[`Numpad${i}`] = 0x60 + i;

    // event.code → display name
    const CODE_TO_NAME = {
      Backquote: "`", Minus: "-", Equal: "=",
      BracketLeft: "[", BracketRight: "]", Backslash: "\\",
      Semicolon: ";", Quote: "'", Comma: ",", Period: ".", Slash: "/",
      Insert: "Insert", Delete: "Delete", Home: "Home", End: "End",
      PageUp: "PgUp", PageDown: "PgDn",
      NumpadMultiply: "Num*", NumpadAdd: "Num+",
      NumpadSubtract: "Num-", NumpadDecimal: "Num.", NumpadDivide: "Num/",
      Space: "Space", Tab: "Tab", CapsLock: "CapsLock",
      ScrollLock: "ScrLk", Pause: "Pause",
    };
    for (let i = 1; i <= 12; i++) CODE_TO_NAME[`F${i}`] = `F${i}`;
    for (let i = 0; i < 26; i++) {
      const ch = String.fromCharCode(65 + i);
      CODE_TO_NAME[`Key${ch}`] = ch;
    }
    for (let i = 0; i < 10; i++) CODE_TO_NAME[`Digit${i}`] = `${i}`;
    for (let i = 0; i < 10; i++) CODE_TO_NAME[`Numpad${i}`] = `Num${i}`;

    let currentHotkeyVk = 0xC0;
    let currentHotkeyName = "`";
    let listening = false;

    invoke("get_settings").then((settings) => {
      durationInput.value = settings.duration_secs;
      cooldownInput.value = settings.cooldown_secs;
      currentHotkeyVk = settings.hotkey_vk;
      currentHotkeyName = settings.hotkey_name;
      hotkeyBtn.textContent = currentHotkeyName;
      const pct = Math.round(settings.overlay_opacity * 100);
      opacityInput.value = pct;
      opacityValue.textContent = pct + "%";
      autoRepeatInput.checked = settings.auto_repeat;
    });

    hotkeyBtn.addEventListener("click", () => {
      listening = true;
      hotkeyBtn.textContent = "키를 누르세요...";
      hotkeyBtn.classList.add("listening");
    });

    document.addEventListener("keydown", (e) => {
      if (!listening) return;
      e.preventDefault();
      e.stopPropagation();

      // Ignore modifier-only keys
      if (["ShiftLeft", "ShiftRight", "ControlLeft", "ControlRight",
           "AltLeft", "AltRight", "MetaLeft", "MetaRight"].includes(e.code)) {
        return;
      }

      const vk = CODE_TO_VK[e.code];
      const name = CODE_TO_NAME[e.code];
      if (vk !== undefined && name !== undefined) {
        currentHotkeyVk = vk;
        currentHotkeyName = name;
        hotkeyBtn.textContent = name;
      } else {
        // Fallback: use the key value
        hotkeyBtn.textContent = e.key;
        currentHotkeyName = e.key;
      }
      listening = false;
      hotkeyBtn.classList.remove("listening");
    });

    // Cancel listening on Escape
    document.addEventListener("keydown", (e) => {
      if (listening && e.code === "Escape") {
        listening = false;
        hotkeyBtn.textContent = currentHotkeyName;
        hotkeyBtn.classList.remove("listening");
        e.preventDefault();
      }
    }, true);

    document.getElementById("save").addEventListener("click", async () => {
      const duration = parseInt(durationInput.value, 10);
      const cooldown = parseInt(cooldownInput.value, 10);
      if (duration > 0 && cooldown > 0) {
        await invoke("save_settings", {
          durationSecs: duration,
          cooldownSecs: cooldown,
          hotkeyVk: currentHotkeyVk,
          hotkeyName: currentHotkeyName,
          overlayOpacity: parseInt(opacityInput.value, 10) / 100,
          autoRepeat: autoRepeatInput.checked,
        });
        savedMsg.classList.add("show");
        setTimeout(() => savedMsg.classList.remove("show"), 1500);
      }
    });
  </script>
</body>
</html>
