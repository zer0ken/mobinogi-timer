name: Release Manual Version

on:
  push:
    tags:
      - 'v*-manual'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2026.2.25-manual)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (변경사항만 입력, 나머지는 자동)'
        required: false
        type: string
        default: '- 변경사항을 입력하세요'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout manual branch
        uses: actions/checkout@v4
        with:
          ref: manual

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx tauri build

      - name: Rename executable
        run: Copy-Item "src-tauri\target\release\mobinogi-timer.exe" "mobinogi-timer-manual.exe"
        shell: pwsh

      - name: Get version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: 수동 버전 v${{ steps.version.outputs.VERSION }}
          body: |
            ## 수동 버전

            ### 변경사항
            ${{ github.event.inputs.release_notes || '- 설정한 단축키로 타이머 수동 시작\n- 엠블럼 선택 기능\n- 자동 반복 옵션' }}

            ### 설치
            `mobinogi-timer-manual.exe`를 다운로드하여 실행하세요.
          files: |
            mobinogi-timer-manual.exe
          draft: false
          prerelease: false
