<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobinogi Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; overflow-y: auto; }
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h2 { margin-bottom: 16px; font-size: 16px; }
    .field {
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 100px 1fr 70px;
      align-items: center;
      gap: 8px;
    }
    label { font-size: 13px; text-align: left; }
    select {
      width: 100%;
      padding: 4px 8px;
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
    }
    input[type="range"] { width: 100%; accent-color: #4caf50; cursor: ew-resize; }
    .range-value { font-size: 12px; color: #999; text-align: right; }
    hr { border: none; border-top: 1px solid #444; margin: 12px 0; }
    .hint { margin-top: 12px; font-size: 13px; color: #777; line-height: 1.6; }
    .hotkey-button {
      width: 100%;
      padding: 6px 8px;
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }
    .hotkey-button:hover { background: #3a3a3a; }
    .hotkey-button.listening { background: #3a5a3a; border-color: #4caf50; }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #4caf50;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>모비노기 각성 타이머 <span id="version" style="font-size:12px;font-weight:normal;color:#666;"></span></h2>

  <div class="field">
    <label>엠블럼</label>
    <select id="selected-emblem" style="grid-column: 2 / 4;">
      <option value="grand_mage">대마법사 (20초)</option>
      <option value="merciless_predator">무자비한 포식자 (20초)</option>
      <option value="melted_earth">녹아내린 대지 (20초)</option>
      <option value="scattering_sword">흩날리는 검 (35초)</option>
      <option value="cracked_earth">갈라진 땅 (35초)</option>
      <option value="distant_light">아득한 빛 (20초)</option>
      <option value="broken_sky">부서진 하늘 (20초)</option>
      <option value="mountain_lord">산맥 군주 (20초)</option>
    </select>
  </div>
  <div class="field">
    <label>눈먼예언자</label>
    <select id="blind-seer" style="grid-column: 2 / 4;">
      <option value="none">미착용</option>
      <option value="base">착용 (-38초)</option>
      <option value="plus">초월 1단계 (-39초)</option>
      <option value="plusplus">초월 2단계 (-40초)</option>
    </select>
  </div>
  <div class="field">
    <span></span>
    <div style="font-size: 12px; color: #999; grid-column: 2 / 4;" id="timer-hint">
      지속시간: 20초 / 쿨다운: 90초
    </div>
  </div>
  <div class="field">
    <label>단축키</label>
    <button id="hotkey-button" class="hotkey-button" style="grid-column: 2 / 4;">`</button>
  </div>
  <div class="field">
    <label>자동 반복</label>
    <input type="checkbox" id="auto-repeat" checked style="justify-self: start;">
    <span></span>
  </div>
  <div class="field">
    <label>투명도</label>
    <input type="range" id="opacity" min="0" max="100" value="85">
    <span class="range-value" id="opacity-value">85%</span>
  </div>
  <div class="field">
    <label>바 너비</label>
    <input type="range" id="overlay-width" min="20" max="400" value="200">
    <span class="range-value" id="overlay-width-value">200px</span>
  </div>
  <div class="field">
    <label>각성 종료 알림</label>
    <input type="range" id="duration-warning" min="0" max="20" value="10">
    <span class="range-value" id="duration-warning-value">10초 전</span>
  </div>
  <div class="field">
    <label>각성 준비 알림</label>
    <input type="range" id="cooldown-warning" min="0" max="90" value="10" style="direction: rtl;">
    <span class="range-value" id="cooldown-warning-value">10초 전</span>
  </div>

  <div class="hint" style="margin-top: 24px;">
    이 창을 선택한 상태에서 오버레이를 드래그할 수 있습니다.<br>
    이 창을 닫으면 앱이 종료됩니다.<br>
    문제 제보나 기능 제안은 <a href="#" onclick="invoke('open_url',{url:'https://github.com/zer0ken/mobinogi-timer/issues'});return false;" style="color:#888;">여기</a>에 남겨주세요.
  </div>
  <div id="update-notice" class="hint" style="display:none;"></div>

  <script>
    const { invoke } = window.__TAURI__.core;

    const blindSeerSelect = document.getElementById("blind-seer");
    const selectedEmblemSelect = document.getElementById("selected-emblem");
    const hotkeyButton = document.getElementById("hotkey-button");
    const autoRepeatCheckbox = document.getElementById("auto-repeat");
    const opacityInput = document.getElementById("opacity");
    const opacityValue = document.getElementById("opacity-value");
    const overlayWidthInput = document.getElementById("overlay-width");
    const overlayWidthValue = document.getElementById("overlay-width-value");
    const durationWarningInput = document.getElementById("duration-warning");
    const durationWarningValue = document.getElementById("duration-warning-value");
    const cooldownWarningInput = document.getElementById("cooldown-warning");
    const cooldownWarningValue = document.getElementById("cooldown-warning-value");
    const timerHint = document.getElementById("timer-hint");

    let currentHotkeyVk = 0xC0;
    let currentHotkeyName = "`";
    let listeningForHotkey = false;

    const emblemDurations = {
      "grand_mage": 20,
      "merciless_predator": 20,
      "melted_earth": 20,
      "scattering_sword": 35,
      "cracked_earth": 35,
      "distant_light": 20,
      "broken_sky": 20,
      "mountain_lord": 20
    };

    const cooldownTimes = {
      "none": 90,
      "base": 52,
      "plus": 51,
      "plusplus": 50
    };

    function updateTimerHint() {
      const duration = emblemDurations[selectedEmblemSelect.value] || 20;
      const cooldown = cooldownTimes[blindSeerSelect.value] || 90;
      timerHint.textContent = `지속시간: ${duration}초 / 쿨다운: ${cooldown}초`;
    }

    const CODE_TO_VK = {
      "Backquote": 0xC0, "Digit1": 0x31, "Digit2": 0x32, "Digit3": 0x33, "Digit4": 0x34,
      "Digit5": 0x35, "Digit6": 0x36, "Digit7": 0x37, "Digit8": 0x38, "Digit9": 0x39, "Digit0": 0x30,
      "Minus": 0xBD, "Equal": 0xBB, "KeyQ": 0x51, "KeyW": 0x57, "KeyE": 0x45, "KeyR": 0x52,
      "KeyT": 0x54, "KeyY": 0x59, "KeyU": 0x55, "KeyI": 0x49, "KeyO": 0x4F, "KeyP": 0x50,
      "BracketLeft": 0xDB, "BracketRight": 0xDD, "Backslash": 0xDC, "KeyA": 0x41, "KeyS": 0x53,
      "KeyD": 0x44, "KeyF": 0x46, "KeyG": 0x47, "KeyH": 0x48, "KeyJ": 0x4A, "KeyK": 0x4B,
      "KeyL": 0x4C, "Semicolon": 0xBA, "Quote": 0xDE, "KeyZ": 0x5A, "KeyX": 0x58, "KeyC": 0x43,
      "KeyV": 0x56, "KeyB": 0x42, "KeyN": 0x4E, "KeyM": 0x4D, "Comma": 0xBC, "Period": 0xBE,
      "Slash": 0xBF, "Space": 0x20, "F1": 0x70, "F2": 0x71, "F3": 0x72, "F4": 0x73, "F5": 0x74,
      "F6": 0x75, "F7": 0x76, "F8": 0x77, "F9": 0x78, "F10": 0x79, "F11": 0x7A, "F12": 0x7B,
      "NumpadDivide": 0x6F, "NumpadMultiply": 0x6A, "NumpadSubtract": 0x6D, "NumpadAdd": 0x6B,
      "NumpadEnter": 0x0D, "Numpad0": 0x60, "Numpad1": 0x61, "Numpad2": 0x62, "Numpad3": 0x63,
      "Numpad4": 0x64, "Numpad5": 0x65, "Numpad6": 0x66, "Numpad7": 0x67, "Numpad8": 0x68, "Numpad9": 0x69,
      "NumpadDecimal": 0x6E
    };

    const CODE_TO_NAME = {
      "Backquote": "`", "Digit1": "1", "Digit2": "2", "Digit3": "3", "Digit4": "4",
      "Digit5": "5", "Digit6": "6", "Digit7": "7", "Digit8": "8", "Digit9": "9", "Digit0": "0",
      "Minus": "-", "Equal": "=", "KeyQ": "Q", "KeyW": "W", "KeyE": "E", "KeyR": "R",
      "KeyT": "T", "KeyY": "Y", "KeyU": "U", "KeyI": "I", "KeyO": "O", "KeyP": "P",
      "BracketLeft": "[", "BracketRight": "]", "Backslash": "\\", "KeyA": "A", "KeyS": "S",
      "KeyD": "D", "KeyF": "F", "KeyG": "G", "KeyH": "H", "KeyJ": "J", "KeyK": "K",
      "KeyL": "L", "Semicolon": ";", "Quote": "'", "KeyZ": "Z", "KeyX": "X", "KeyC": "C",
      "KeyV": "V", "KeyB": "B", "KeyN": "N", "KeyM": "M", "Comma": ",", "Period": ".",
      "Slash": "/", "Space": "Space", "F1": "F1", "F2": "F2", "F3": "F3", "F4": "F4", "F5": "F5",
      "F6": "F6", "F7": "F7", "F8": "F8", "F9": "F9", "F10": "F10", "F11": "F11", "F12": "F12",
      "NumpadDivide": "Num/", "NumpadMultiply": "Num*", "NumpadSubtract": "Num-", "NumpadAdd": "Num+",
      "NumpadEnter": "NumEnter", "Numpad0": "Num0", "Numpad1": "Num1", "Numpad2": "Num2", "Numpad3": "Num3",
      "Numpad4": "Num4", "Numpad5": "Num5", "Numpad6": "Num6", "Numpad7": "Num7", "Numpad8": "Num8",
      "Numpad9": "Num9", "NumpadDecimal": "Num."
    };

    function saveSettings() {
      invoke("save_settings", {
        blindSeer: blindSeerSelect.value,
        overlayOpacity: parseInt(opacityInput.value, 10) / 100,
        overlayWidth: parseInt(overlayWidthInput.value, 10),
        hotkeyVk: currentHotkeyVk,
        hotkeyName: currentHotkeyName,
        autoRepeat: autoRepeatCheckbox.checked,
        selectedEmblem: selectedEmblemSelect.value,
        durationWarningThreshold: parseInt(durationWarningInput.value, 10),
        cooldownWarningThreshold: parseInt(cooldownWarningInput.value, 10),
      });
    }

    blindSeerSelect.addEventListener("change", () => {
      updateTimerHint();
      saveSettings();
    });
    selectedEmblemSelect.addEventListener("change", () => {
      updateTimerHint();
      saveSettings();
    });
    autoRepeatCheckbox.addEventListener("change", saveSettings);
    opacityInput.addEventListener("input", () => {
      opacityValue.textContent = opacityInput.value + "%";
      saveSettings();
    });
    overlayWidthInput.addEventListener("input", () => {
      overlayWidthValue.textContent = overlayWidthInput.value + "px";
      saveSettings();
    });
    durationWarningInput.addEventListener("input", () => {
      durationWarningValue.textContent = durationWarningInput.value + "초 전";
      saveSettings();
    });
    cooldownWarningInput.addEventListener("input", () => {
      cooldownWarningValue.textContent = cooldownWarningInput.value + "초 전";
      saveSettings();
    });

    function wheelStep(input, e) {
      e.preventDefault();
      const v = parseInt(input.value, 10) + (e.deltaY < 0 ? 1 : -1);
      input.value = Math.max(input.min, Math.min(input.max, v));
      input.dispatchEvent(new Event("input"));
    }
    opacityInput.addEventListener("wheel", (e) => wheelStep(opacityInput, e));
    overlayWidthInput.addEventListener("wheel", (e) => wheelStep(overlayWidthInput, e));
    durationWarningInput.addEventListener("wheel", (e) => wheelStep(durationWarningInput, e));
    cooldownWarningInput.addEventListener("wheel", (e) => wheelStep(cooldownWarningInput, e));

    // Hotkey configuration
    hotkeyButton.addEventListener("click", () => {
      if (listeningForHotkey) return;
      listeningForHotkey = true;
      hotkeyButton.textContent = "키를 눌러주세요... (ESC로 취소)";
      hotkeyButton.classList.add("listening");
    });

    document.addEventListener("keydown", (e) => {
      if (!listeningForHotkey) return;
      e.preventDefault();
      if (e.code === "Escape") {
        listeningForHotkey = false;
        hotkeyButton.textContent = currentHotkeyName;
        hotkeyButton.classList.remove("listening");
        return;
      }
      const vk = CODE_TO_VK[e.code];
      const name = CODE_TO_NAME[e.code];
      if (vk !== undefined && name !== undefined) {
        currentHotkeyVk = vk;
        currentHotkeyName = name;
        hotkeyButton.textContent = name;
        listeningForHotkey = false;
        hotkeyButton.classList.remove("listening");
        saveSettings();
      }
    });

    // Load settings
    invoke("get_settings").then((s) => {
      blindSeerSelect.value = s.blind_seer;
      const pct = Math.round(s.overlay_opacity * 100);
      opacityInput.value = pct;
      opacityValue.textContent = pct + "%";
      overlayWidthInput.value = s.overlay_width;
      overlayWidthValue.textContent = s.overlay_width + "px";
      currentHotkeyVk = s.hotkey_vk;
      currentHotkeyName = s.hotkey_name;
      hotkeyButton.textContent = currentHotkeyName;
      autoRepeatCheckbox.checked = s.auto_repeat;
      selectedEmblemSelect.value = s.selected_emblem;
      durationWarningInput.value = s.duration_warning_threshold;
      durationWarningValue.textContent = s.duration_warning_threshold + "초 전";
      cooldownWarningInput.value = s.cooldown_warning_threshold;
      cooldownWarningValue.textContent = s.cooldown_warning_threshold + "초 전";
      updateTimerHint();
    });

    // Version display & update check
    invoke("get_version").then((version) => {
      document.getElementById("version").textContent = "v" + version;
      invoke("check_update").then((info) => {
        const tag = info.tag ? info.tag.replace(/^v/, "") : "";
        if (tag && tag !== version) {
          const notice = document.getElementById("update-notice");
          notice.innerHTML = '업데이트가 있습니다: <a href="#" style="color:#888;" onclick="invoke(\'open_url\',{url:\'' + info.url + '\'});return false;">v' + tag + '</a>';
          notice.style.display = "block";
        }
      });
    });

  </script>
</body>
</html>
