<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobinogi Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; overflow-y: auto; }
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h2 { margin-bottom: 16px; font-size: 16px; }
    .field {
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 80px 1fr;
      align-items: center;
      gap: 8px;
    }
    label { font-size: 13px; }
    select {
      width: 100%;
      padding: 4px 8px;
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
    }
    .range-wrap { display: flex; align-items: center; gap: 8px; }
    input[type="range"] { flex: 1; accent-color: #4caf50; cursor: ew-resize; }
    .range-value { font-size: 12px; color: #999; min-width: 32px; }
    hr { border: none; border-top: 1px solid #444; margin: 12px 0; }
    .hint { margin-top: 12px; font-size: 11px; color: #777; line-height: 1.6; }
    .npcap-banner {
      background: #4a2020;
      border: 1px solid #e53935;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #ffcdd2;
      line-height: 1.6;
      display: none;
      align-items: start;
      gap: 8px;
    }
    .npcap-banner a { color: #ef9a9a; }
    .npcap-banner > span { flex: 1; }
    .npcap-refresh {
      background: none; border: 1px solid #ef9a9a; border-radius: 3px;
      color: #ef9a9a; font-size: 11px; padding: 2px 8px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .npcap-refresh:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <h2>모비노기 각성 타이머</h2>

  <div id="npcap-banner" class="npcap-banner">
    <span>패킷 캡쳐를 위해 <a href="#" onclick="invoke('open_url',{url:'https://npcap.com/dist/npcap-1.87.exe'});return false;">Npcap</a>을 설치해야 합니다.</span>
    <button class="npcap-refresh" onclick="recheckNpcap()">재확인</button>
  </div>

  <!-- Section 1: Rune Settings -->
  <div class="field">
    <label>눈먼예언자</label>
    <select id="blind-seer">
      <option value="none">미착용</option>
      <option value="base">착용 (-38초)</option>
      <option value="plus">초월 1단계 (-39초)</option>
      <option value="plusplus">초월 2단계 (-40초)</option>
    </select>
  </div>
  <div class="field">
    <label>투명도</label>
    <div class="range-wrap">
      <input type="range" id="opacity" min="0" max="100" value="85">
      <span class="range-value" id="opacity-value">85%</span>
    </div>
  </div>
  <div class="field">
    <label>바 너비</label>
    <div class="range-wrap">
      <input type="range" id="overlay-width" min="20" max="400" value="200">
      <span class="range-value" id="overlay-width-value">200px</span>
    </div>
  </div>

  <hr>

  <!-- Packet Capture -->
  <div class="field">
    <label>네트워크</label>
    <select id="interface"></select>
  </div>

  <div class="hint" style="margin-top: 24px;">
    이 창을 선택한 상태에서 오버레이를 드래그할 수 있습니다.<br>
    이 창을 닫으면 앱이 종료됩니다.<br>
    문제 제보나 기능 제안은 <a href="#" onclick="invoke('open_url',{url:'https://github.com/zer0ken/mobinogi-timer/issues'});return false;" style="color:#888;">여기</a>에 남겨주세요.<br>
    <a href="#" onclick="document.getElementById('npcap-banner').style.display='flex';return false;" style="color:#888;">Npcap 설치</a>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;

    const blindSeerSelect = document.getElementById("blind-seer");
    const interfaceSelect = document.getElementById("interface");
    const opacityInput = document.getElementById("opacity");
    const opacityValue = document.getElementById("opacity-value");
    const overlayWidthInput = document.getElementById("overlay-width");
    const overlayWidthValue = document.getElementById("overlay-width-value");

    function saveSettings() {
      invoke("save_settings", {
        blindSeer: blindSeerSelect.value,
        overlayOpacity: parseInt(opacityInput.value, 10) / 100,
        overlayWidth: parseInt(overlayWidthInput.value, 10),
        networkInterface: interfaceSelect.value,
      });
    }

    blindSeerSelect.addEventListener("change", saveSettings);
    interfaceSelect.addEventListener("change", saveSettings);
    opacityInput.addEventListener("input", () => {
      opacityValue.textContent = opacityInput.value + "%";
      saveSettings();
    });
    overlayWidthInput.addEventListener("input", () => {
      overlayWidthValue.textContent = overlayWidthInput.value + "px";
      saveSettings();
    });

    function wheelStep(input, e) {
      e.preventDefault();
      const v = parseInt(input.value, 10) + (e.deltaY < 0 ? 1 : -1);
      input.value = Math.max(input.min, Math.min(input.max, v));
      input.dispatchEvent(new Event("input"));
    }
    opacityInput.addEventListener("wheel", (e) => wheelStep(opacityInput, e));
    overlayWidthInput.addEventListener("wheel", (e) => wheelStep(overlayWidthInput, e));

    // Check Npcap
    function recheckNpcap() {
      invoke("check_npcap").then((ok) => {
        document.getElementById("npcap-banner").style.display = ok ? "none" : "flex";
      });
    }
    recheckNpcap();

    // Load settings
    invoke("get_settings").then((s) => {
      blindSeerSelect.value = s.blind_seer;
      const pct = Math.round(s.overlay_opacity * 100);
      opacityInput.value = pct;
      opacityValue.textContent = pct + "%";
      overlayWidthInput.value = s.overlay_width;
      overlayWidthValue.textContent = s.overlay_width + "px";
      interfaceSelect.value = s.network_interface;
    });

    // Load network interfaces
    invoke("list_interfaces").then((result) => {
      const { devices, default: defaultName } = result;
      for (const d of devices) {
        const opt = document.createElement("option");
        opt.value = d.name;
        opt.textContent = d.desc || d.name;
        interfaceSelect.appendChild(opt);
      }
      invoke("get_settings").then((s) => {
        if (s.network_interface && devices.some(d => d.name === s.network_interface)) {
          interfaceSelect.value = s.network_interface;
        } else {
          interfaceSelect.value = defaultName;
          saveSettings();
        }
      });
    });

  </script>
</body>
</html>
